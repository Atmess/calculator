<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculator</title>
</head>
<body>

 <div id="calculator">
  <div id="display" class="display">0</div>
  <div class="key">
      <button class="func" data-action="clear">C</button>
      <button class="func" data-action="neg">+/-</button>
      <button class="func" data-action="persen">%</button>
      <button class="op" data-action="/">÷</button>
      <button class="digit" data-action="7">7</button>
      <button class="digit" data-action="8">8</button>
      <button class="digit" data-action="9">9</button>
      <button class="op" data-action="*">x</button>
      <button class="digit" data-action="6">6</button>
      <button class="digit" data-action="5">5</button>
      <button class="digit" data-action="4">4</button>
      <button class="op" data-action="-">-</button>
      <button class="digit" data-action="3">3</button>
      <button class="digit" data-action="2">2</button>
      <button class="digit" data-action="1">1</button>
      <button class="op" data-action="+">+</button>
  </div>
 </div>

 
<script src="script.js"></script>
</body>
</html>
